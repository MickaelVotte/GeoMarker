services:
  api:
    build:
      context: .
      target: final
      platforms:
        - linux/amd64
        - linux/arm64
    container_name: geomarker-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - geomarker-network
    # Uncomment for development with hot reload
    # volumes:
    #   - .:/source
    # build:
    #   context: .
    #   target: build

networks:
  geomarker-network:
    driver: bridge

